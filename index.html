<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #f0ede8;
        --color-background-info: #e6f1fb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-background-danger: #fcebeb;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6b68;
        --color-text-tertiary: #9e9e9b;
        --color-text-info: #185fa5;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-text-danger: #a32d2d;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --color-border-primary: rgba(0,0,0,0.32);
        --color-border-info: #b5d4f4;
        --color-border-success: #c0dd97;
        --color-border-warning: #fac775;
        --color-border-danger: #f7c1c1;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1b;
          --color-background-secondary: #252524;
          --color-background-tertiary: #2c2c2a;
          --color-background-info: #042c53;
          --color-background-success: #173404;
          --color-background-warning: #412402;
          --color-background-danger: #501313;
          --color-text-primary: #f0ede8;
          --color-text-secondary: #a8a8a4;
          --color-text-tertiary: #6b6b68;
          --color-text-info: #85b7eb;
          --color-text-success: #97c459;
          --color-text-warning: #ef9f27;
          --color-text-danger: #f09595;
          --color-border-tertiary: rgba(255,255,255,0.12);
          --color-border-secondary: rgba(255,255,255,0.22);
          --color-border-primary: rgba(255,255,255,0.32);
          --color-border-info: #0c447c;
          --color-border-success: #27500a;
          --color-border-warning: #633806;
          --color-border-danger: #791f1f;
        }
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-tertiary);
        color: var(--color-text-primary);
        font-size: 16px;
        line-height: 1.5;
      }
      input, select, textarea {
        font-family: var(--font-sans);
        font-size: 14px;
        color: var(--color-text-primary);
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 6px 10px;
        outline: none;
        height: 36px;
      }
      input:focus, select:focus { border-color: var(--color-border-primary); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
      button {
        font-family: var(--font-sans);
        font-size: 13px;
        color: var(--color-text-primary);
        background: transparent;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 6px 12px;
        cursor: pointer;
        height: 36px;
        display: inline-flex;
        align-items: center;
      }
      button:hover { background: var(--color-background-secondary); }
      button:active { transform: scale(0.98); }
      .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
